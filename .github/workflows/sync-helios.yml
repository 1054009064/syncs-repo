name: Sync Helios repository

on:
  push:
    paths:
      - '.github/workflows/sync-helios.yml'
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  moontv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout git repository
        uses: actions/checkout@main
        with:
          repository: 1054009064/Helios
          token: ${{ secrets.CI_LINUX }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git --version
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      - name: Add remotes repository
        run: ${{ secrets.HELIOS_ARR }}

      - name: Force sync branches
        run: ${{ secrets.HELIOS_FSB }}

      - name: Last check space usage
        run: df -hT
