name: Sync BPB-Worker-Panel repository

on:
  push:
    paths:
      - '.github/workflows/sync-bpb-panel.yml'
  schedule:
    - cron: 0 */4 * * *
  workflow_dispatch:

jobs:
  bpb-panel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout git repository
        uses: actions/checkout@main
        with:
          repository: 1054009064/BPB-Worker-Panel
          token: ${{ secrets.CI_LINUX }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git --version
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      - name: Add remotes repository
        run: ${{ secrets.BPB_PANEL_ARR }}

      - name: Force sync branches
        run: ${{ secrets.BPB_PANEL_FSB }}

      - name: Last check space usage
        run: df -hT
